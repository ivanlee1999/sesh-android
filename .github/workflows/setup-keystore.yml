name: Setup Debug Keystore

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate stable debug keystore
        run: |
          keytool -genkeypair -v \
            -keystore app/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 \
            -validity 36500 \
            -storepass android -keypass android \
            -dname "CN=sesh,O=ivanlee,C=US"
          echo "=== SHA-1 Fingerprint ==="
          keytool -list -v -keystore app/debug.keystore -alias androiddebugkey -storepass android | grep SHA1
          echo "========================="

      - name: Commit keystore
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add app/debug.keystore
          git commit -m "ci: add stable debug keystore for consistent SHA-1"
          git push
